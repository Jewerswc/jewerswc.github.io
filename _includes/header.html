<header class="site-header">
  <div class="site-brand">
    <div class="site-title">
      <a href="{{ '/' | relative_url }}">William Jewers</a>
    </div>
    <p class="site-tagline">
      Founder, builder, and writer working across AI, institutions, and public systems.
    </p>
  </div>
  <div class="site-header-meta">
    <nav class="site-nav" aria-label="Primary">
      <a
        href="{{ '/' | relative_url }}"
        {% if page.page_key == 'home' %}class="is-active" aria-current="page"{% endif %}
      >Home</a>
      <a
        href="{{ '/work.html' | relative_url }}"
        {% if page.page_key == 'work' %}class="is-active" aria-current="page"{% endif %}
      >Work</a>
      <a
        href="{{ '/blog.html' | relative_url }}"
        {% if page.page_key == 'writing' %}class="is-active" aria-current="page"{% endif %}
      >Writing</a>
    </nav>
    <div class="site-link-cluster" aria-label="Profiles and current company">
      <a href="https://parlyreply.com" target="_blank" rel="noopener">
        <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
        <span>ParlyReply</span>
      </a>
      <a href="https://github.com/jewerswc" target="_blank" rel="noopener">
        <i class="fab fa-github" aria-hidden="true"></i>
        <span>GitHub</span>
      </a>
      <a href="https://www.linkedin.com/in/williamcjewers" target="_blank" rel="noopener">
        <i class="fab fa-linkedin-in" aria-hidden="true"></i>
        <span>LinkedIn</span>
      </a>
      <a href="https://twitter.com/WilliamJewers" target="_blank" rel="noopener">
        <i class="fab fa-x-twitter" aria-hidden="true"></i>
        <span>X</span>
      </a>
      <a href="mailto:william.jewers@gmail.com">
        <i class="far fa-envelope" aria-hidden="true"></i>
        <span>Email</span>
      </a>
    </div>
  </div>
</header>
